<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本动漫风格馆 | Manga Style Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ===== HERO AREA ===== */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-video {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
    }
    .hero-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(180deg,
        rgba(0,0,0,0.3) 0%,
        rgba(0,0,0,0.5) 50%,
        rgba(0,0,0,0.7) 100%
      );
      z-index: 2;
    }
    .hero-content {
      position: relative;
      z-index: 3;
      text-align: center;
    }
    .hero-title {
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      line-height: 1.1;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff2a6d 0%, #ff8a00 50%, #fcee0a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 60px rgba(255,42,109,0.3);
      animation: titlePulse 3s ease-in-out infinite;
    }
    .hero-subtitle {
      margin-top: 1rem;
      font-size: clamp(1rem, 2vw, 1.5rem);
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
    .audio-toggle {
      position: absolute;
      bottom: 30px;
      right: 30px;
      z-index: 4;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 12px 20px;
      border-radius: 30px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      font-size: 14px;
    }
    .audio-toggle:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.05);
    }
    .scroll-hint {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 0.2em;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.2); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(10px); }
    }

    /* ===== GALLERY AREA ===== */
    .gallery {
      padding: 80px 20px;
      max-width: 1600px;
      margin: 0 auto;
    }
    .gallery-title {
      text-align: center;
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 800;
      margin-bottom: 60px;
      letter-spacing: 0.1em;
      background: linear-gradient(90deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .waterfall {
      column-count: 4;
      column-gap: 20px;
    }
    @media (max-width: 1200px) {
      .waterfall { column-count: 3; }
    }
    @media (max-width: 768px) {
      .waterfall { column-count: 2; column-gap: 12px; }
      .gallery { padding: 40px 12px; }
    }
    .manga-card {
      break-inside: avoid;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      background: #1a1a1a;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  box-shadow 0.4s ease;
      cursor: pointer;
    }
    .manga-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 60px rgba(255,42,109,0.2);
    }
    .manga-card img {
      width: 100%;
      display: block;
      filter: grayscale(100%) contrast(1.1);
      transition: filter 0.4s ease;
    }
    .manga-card:hover img {
      filter: grayscale(0%) contrast(1.1);
    }
    .manga-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 15px 15px;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .manga-label .name-ja {
      font-size: 18px;
      margin-bottom: 4px;
    }
    .manga-label .name-en {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 100px 20px;
      color: #666;
      font-size: 14px;
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <video class="hero-video" autoplay loop muted playsinline id="heroVideo">
      <source src="assets/hero-video.mp4" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="hero-title">日本动漫风格馆</h1>
      <p class="hero-subtitle">Manga Style Gallery</p>
    </div>
    <button class="audio-toggle" id="audioToggle">
      🔇 开启音效
    </button>
    <div class="scroll-hint">▼ 向下滚动探索 ▼</div>
  </section>

  <!-- GALLERY -->
  <section class="gallery">
    <h2 class="gallery-title">漫画家风格典藏</h2>
    <div class="waterfall" id="gallery">
      <div class="loading">生成中... 请稍候</div>
    </div>
  </section>

  <script>
    // Audio toggle
    const video = document.getElementById('heroVideo');
    const audioBtn = document.getElementById('audioToggle');
    audioBtn.addEventListener('click', () => {
      video.muted = !video.muted;
      audioBtn.textContent = video.muted ? '🔇 开启音效' : '🔊 关闭音效';
    });
  </script>
</body>
</html>
